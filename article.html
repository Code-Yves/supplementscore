<style>
.dt-wrap{max-width:840px;margin:0 auto;padding:24px}
.dt-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary);text-decoration:none;padding:6px 12px;border:1px solid var(--color-border-secondary);border-radius:999px;background:var(--color-background-primary);transition:all .15s;margin:18px 0 14px}
.dt-back:hover{background:rgba(123,31,162,.06);border-color:var(--color-brand);color:var(--color-brand)}
.dt-cat{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-bottom:10px}
.dt-cat-guide{background:var(--t2bg);color:var(--t2tx)}
.dt-cat-breakthrough{background:var(--t1bg);color:var(--t1tx)}
.dt-cat-myth{background:var(--t3bg);color:var(--t3tx)}
.dt-cat-safety{background:var(--t4bg);color:var(--t4tx)}
.dt-cat-kids{background:rgba(190,24,93,.10);color:#9D174D}
.dt-h1{font-size:clamp(28px,4vw,42px);font-weight:700;letter-spacing:-1px;margin:0 0 6px;color:var(--color-text-primary);line-height:1.1}
.dt-meta{font-size:13px;color:var(--color-text-tertiary);margin-bottom:20px}
.dt-callout{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-left:3px solid var(--color-brand);border-radius:10px;padding:18px 20px;margin:14px 0}
.dt-callout p{margin:0;font-size:14px;line-height:1.55;color:var(--color-text-secondary)}
.dt-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:14px;padding:20px 22px;margin-top:14px}
.dt-card h2{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin:0 0 12px}
.sup-list{display:flex;flex-direction:column;gap:8px;margin:0;padding:0;list-style:none}
.sup-list a{padding:10px 12px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:10px;font-size:13.5px;color:var(--color-text-primary);text-decoration:none;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sup-list a:hover{border-color:var(--color-brand);color:var(--color-brand)}
.dt-tier{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:5px}
.dt-tier-t1{background:var(--t1bg);color:var(--t1tx)}
.dt-tier-t2{background:var(--t2bg);color:var(--t2tx)}
.dt-tier-t3{background:var(--t3bg);color:var(--t3tx)}
.dt-tier-t4{background:var(--t4bg);color:var(--t4tx)}
.dt-disclaim{margin:32px 0 24px;font-size:12px;color:var(--color-text-tertiary);text-align:center;line-height:1.55}
</style>

<script>
(function(){
  function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]});}
  var p = new URLSearchParams(location.search);
  var id = (p.get('id') || '').trim();
  var root = document.getElementById('dt-root');
  if (!id){ root.innerHTML = '<a class="dt-back" href="index.html">‹ Back</a><h1 class="dt-h1">No article specified</h1>'; return; }
  var a = window.SS.getArticle(id);
  if (!a){ root.innerHTML = '<a class="dt-back" href="search.html">‹ Back to search</a><h1 class="dt-h1">Article not found</h1><p>No article #' + escapeHtml(id) + '.</p>'; return; }
  document.title = a.t + ' — SupplementScore';

  // Reverse-derive: which supplements does this article reference?
  var AM = window.SS.getArticleMap();
  var related = [];
  Object.keys(AM).forEach(function(suppName){
    var arr = AM[suppName] || [];
    if (arr.some(function(x){ return String(x.id) === String(id); })) {
      var s = window.SS.getSupplement(window.SS.slugify(suppName));
      related.push({ name: suppName, ref: s });
    }
  });

  var cat = (a.c || 'article').toLowerCase();
  var catLabel = cat.replace(/^./, function(c){return c.toUpperCase();});

  function suppLink(p){
    var s = p.ref;
    var tier = s ? '<span class="dt-tier dt-tier-' + s.t + '">' + window.SS.tierMeta(s.t).badge + '</span>' : '';
    var url  = s ? window.SS.urlFor('supplement', window.SS.slugify(s.n)) : 'search.html?q=' + encodeURIComponent(p.name);
    return '<a href="' + url + '"><span>' + escapeHtml(p.name) + '</span>' + tier + '</a>';
  }

  root.innerHTML =
    '<a class="dt-back" href="index.html#research">‹ All articles</a>'
    + '<span class="dt-cat dt-cat-' + cat + '">' + escapeHtml(catLabel) + '</span>'
    + '<h1 class="dt-h1">' + escapeHtml(a.t) + '</h1>'
    + '<div class="dt-meta">Article #' + escapeHtml(String(id)) + (a.m ? ' · ' + a.m + ' min read' : '') + '</div>'

    + '<div class="dt-callout"><p>The full body of this article lives on the main Index in the Research tab. Below are the supplements it references — each one links to its own scored detail page.</p></div>'

    + '<section class="dt-card"><h2>Supplements referenced in this article</h2>'
    +   (related.length ? '<ul class="sup-list">' + related.map(suppLink).join('') + '</ul>' : '<div style="font-size:13px;color:var(--color-text-tertiary)">No supplements explicitly cross-linked to this article.</div>')
    + '</section>'

    + '<p class="dt-disclaim">All articles are reviewed and updated regularly. <a href="index.html#research">Open the full Research tab</a> to read the latest version.</p>';
})();
</script>
