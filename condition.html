.sup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.sup-card{display:flex;flex-direction:column;gap:6px;padding:12px 14px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:10px;text-decoration:none;color:var(--color-text-primary);transition:all .15s}
.sup-card:hover{border-color:var(--color-brand);transform:translateY(-1px)}
.sup-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sup-name{font-size:13.5px;font-weight:600}
.sup-meta{font-size:11.5px;color:var(--color-text-tertiary)}
.dt-tier{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:5px;flex-shrink:0}
.dt-tier-t1{background:var(--t1bg);color:var(--t1tx)}
.dt-tier-t2{background:var(--t2bg);color:var(--t2tx)}

.dt-tier-t4{background:var(--t4bg);color:var(--t4tx)}
.dt-empty{font-size:13px;color:var(--color-text-tertiary);font-style:italic}
.dt-disclaim{margin:32px 0 24px;font-size:12px;color:var(--color-text-tertiary);text-align:center;line-height:1.55}

<script>
(function(){
  function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]});}
  var p = new URLSearchParams(location.search);
  var slug = (p.get('slug') || '').trim();
  var root = document.getElementById('dt-root');
  if (!slug){ root.innerHTML = '<a class="dt-back" href="index.html">‹ Back</a><h1 class="dt-h1">No condition specified</h1>'; return; }
  var c = window.SS.getCondition(slug);
  if (!c){ root.innerHTML = '<a class="dt-back" href="search.html">‹ Back to search</a><h1 class="dt-h1">Condition not found</h1><p class="dt-tag">No record for slug "' + escapeHtml(slug) + '".</p>'; return; }
  document.title = c.label + ' — SupplementScore';

  var picks = (c.supps || []).map(function(name){
    var s = window.SS.getSupplement(window.SS.slugify(name));
    return { name: name, ref: s };
  });

  function suppCard(p){
    var s = p.ref;
    if (!s){
      return '<div class="sup-card" style="cursor:default;opacity:.6"><div class="sup-row"><span class="sup-name">' + escapeHtml(p.name) + '</span></div><div class="sup-meta">No record</div></div>';
    }
    var tier = window.SS.tierMeta(s.t);
    var sc = window.SS.compositeScore(s);
    return '<a class="sup-card" href="' + window.SS.urlFor('supplement', window.SS.slugify(s.n)) + '">'
      + '<div class="sup-row"><span class="sup-name">' + escapeHtml(s.n) + '</span><span class="dt-tier dt-tier-' + s.t + '">' + escapeHtml(tier.badge) + '</span></div>'
      + '<div class="sup-meta">' + escapeHtml(s.tag || '') + ' · Score ' + sc + '</div>'
    + '</a>';
  }

  root.innerHTML =
    '<a class="dt-back" href="search.html?q=' + encodeURIComponent(c.label) + '">‹ Back to search</a>'
    + '<div class="dt-eyebrow">Condition</div>'
    + '<h1 class="dt-h1">' + escapeHtml(c.label) + '</h1>'
    + '<div class="dt-tag">Evidence-based supplement picks for ' + escapeHtml(c.label.toLowerCase()) + '. All picks are reviewed at the supplement level — click any card for the full record.</div>'
    + '<section class="dt-card"><h2>Recommended supplements</h2>'
    +   (picks.length ? '<div class="sup-grid">' + picks.map(suppCard).join('') + '</div>' : '<div class="dt-empty">No supplements on file.</div>')
    + '</section>'
    + '<p class="dt-disclaim">Educational reference, not medical advice. Always discuss new supplements with a qualified clinician.</p>'
    + '<div class="dt-disclaim" style="font-size:11.5px;line-height:1.7;text-align:center;margin-top:8px"><strong style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-right:6px">Methodology</strong><a href="methodology.html" style="color:inherit;text-decoration:underline;margin-right:6px">Scoring</a> · <a href="editorial-pipeline.html" style="color:inherit;text-decoration:underline;margin-right:6px">Editorial pipeline</a> · <a href="funder-policy.html" style="color:inherit;text-decoration:underline;margin-right:6px">Funder policy</a> · <a href="changed-our-mind.html" style="color:inherit;text-decoration:underline;margin-right:6px">How we changed our mind</a> · <a href="bibliography.html" style="color:inherit;text-decoration:underline;margin-right:6px">Bibliography</a><br><strong style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-right:6px">Site</strong><a href="about.html" style="color:inherit;text-decoration:underline;margin-right:6px">About</a> · <a href="privacy.html" style="color:inherit;text-decoration:underline;margin-right:6px">Privacy</a> · <a href="terms.html" style="color:inherit;text-decoration:underline;margin-right:6px">Terms</a> · <a href="accessibility.html" style="color:inherit;text-decoration:underline">Accessibility</a></div>';
})();
</script>
